<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MediBot · Medical Assistant</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <div class="app">
    <div class="header">
      <div class="header-top">
        <div class="avatar">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 21s-7.5-4.6-10-9.2C0.3 8.1 2 4 6 4c2 0 3.5 1.1 6 3.6C14.5 5.1 16 4 18 4c4 0 5.7 4.1 4 7.8C19.5 16.4 12 21 12 21z" fill="#EAF0FA" fill-opacity="0.9"/>
          </svg>
        </div>
        <div class="header-text">
          <div class="bot-name">MediBot</div>
          <div class="bot-status"><span class="status-dot"></span>Online · Ready to help</div>
        </div>
      </div>
      <div class="ecg-wrap">
        <svg viewBox="0 0 300 26" preserveAspectRatio="none">
          <path class="ecg-line"
            d="M0,13 L60,13 L72,13 L78,2 L86,24 L94,6 L100,13 L112,13 L300,13" />
        </svg>
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="row bot">
        <div>
          <div class="bubble">Hi, I'm MediBot. Tell me your symptoms or ask a health question, and I'll do my best to help.</div>
          <div class="timestamp">Just now</div>
        </div>
      </div>
    </div>

    <div class="disclaimer">MediBot can make mistakes. Not a substitute for professional medical advice.</div>

    <div class="input-bar">
      <div class="input-pill">
        <input type="text" id="msg-input" placeholder="Describe your symptoms…" autocomplete="off" />
      </div>
      <button id="send-btn" aria-label="Send message">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 12L20 4L13 20L11 13L4 12Z" fill="#0A1428"/>
        </svg>
      </button>
    </div>
  </div>

<script>
  const messages = document.getElementById('messages');
  const input = document.getElementById('msg-input');
  const sendBtn = document.getElementById('send-btn');

  function timeNow() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function appendMessage(text, sender) {
    const row = document.createElement('div');
    row.className = `row ${sender}`;
    row.innerHTML = `
      <div>
        <div class="bubble"></div>
        <div class="timestamp">${timeNow()}</div>
      </div>`;
    row.querySelector('.bubble').textContent = text;
    messages.appendChild(row);
    messages.scrollTop = messages.scrollHeight;
    return row;
  }

  function showTyping() {
    const row = document.createElement('div');
    row.className = 'row bot typing';
    row.innerHTML = `
      <div class="bubble">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      </div>`;
    messages.appendChild(row);
    messages.scrollTop = messages.scrollHeight;
    return row;
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    appendMessage(text, 'user');
    input.value = '';
    const typingRow = showTyping();

    try {
      const response = await fetch('/get', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({ msg: text })
      });
      const reply = await response.text();
      typingRow.remove();
      appendMessage(reply, 'bot');
    } catch (err) {
      typingRow.remove();
      appendMessage("Sorry, I couldn't reach the server. Please try again.", 'bot');
    }
  }

  sendBtn.addEventListener('click', sendMessage);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendMessage();
  });

  input.focus();
</script>

</body>
</html>
